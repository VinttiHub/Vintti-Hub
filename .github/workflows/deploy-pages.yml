name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'CNAME'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

# Permisos que necesita el deploy con GitHub Actions como fuente de Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy a la vez; si entra uno nuevo mientras hay otro corriendo/encolado,
# cancela el anterior. Evita justamente la cola trabada de `deployment_queued`.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (docs/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        timeout-minutes: 10

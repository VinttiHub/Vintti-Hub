<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Apply Now • Vintti</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/css/applicant-form.css" />
</head>
<body>
  <main class="apply-page">
    <section class="form-shell">
      <header class="form-header">
        <div class="header-top">
          <img src="./assets/img/vintti_logo.png" alt="Vintti Logo" class="vintti-logo" />
          <div class="header-chip">Takes 2-3 minutes</div>
        </div>
        <div class="header-body">
          <p class="eyebrow">Join the team</p>
          <h1>Apply in minutes</h1>
        </div>
      </header>

      <form id="applicantForm" class="apply-form">
        <input type="hidden" name="opportunity_id" id="opportunityId" />
        <div class="field-grid">
          <label class="field">
            <span>First Name</span>
            <input name="first_name" type="text" placeholder="What's your first name?" required />
          </label>

          <label class="field">
            <span>Last Name</span>
            <input name="last_name" type="text" placeholder="What's your last name?" required />
          </label>

          <label class="field">
            <span>Email address</span>
            <input name="email" type="email" placeholder="What's your email address?" required />
          </label>

          <label class="field">
            <span>Phone number</span>
            <input name="phone" type="tel" placeholder="What's your phone number?" required />
          </label>

          <label class="field">
            <span>Location</span>
            <select name="location" required>
              <option value="" disabled selected>Your location</option>
              <option value="Argentina">Argentina</option>
              <option value="Brazil">Brazil</option>
              <option value="Chile">Chile</option>
              <option value="Colombia">Colombia</option>
              <option value="Mexico">Mexico</option>
              <option value="Other">Other</option>
            </select>
          </label>

          <label class="field">
            <span>Role/position</span>
            <input name="role_position" type="text" placeholder="Sales & Marketing Assistant" required />
          </label>

          <label class="field">
            <span>Area</span>
            <input name="area" type="text" placeholder="Marketing" required />
          </label>

          <label class="field">
            <span>LinkedIn Profile URL</span>
            <input name="linkedin_url" type="url" placeholder="https://www.linkedin.com/in/" required />
          </label>

          <label class="field">
            <span>English level</span>
            <select name="english_level" required>
              <option value="" disabled selected>What's your English level?</option>
              <option value="Beginner">Beginner</option>
              <option value="Intermediate">Intermediate</option>
              <option value="Advanced">Advanced</option>
              <option value="Fluent">Fluent</option>
              <option value="Native">Native</option>
            </select>
          </label>

          <label class="field">
            <span>How did you find out about this position?</span>
            <select name="referral_source" required>
              <option value="" disabled selected>How did you find out about this position?</option>
              <option value="LinkedIn">LinkedIn</option>
              <option value="Referral">Referral</option>
              <option value="Website">Website</option>
              <option value="Social Media">Social Media</option>
              <option value="Other">Other</option>
            </select>
          </label>
        </div>

        <section class="upload-card">
          <div>
            <h2>Upload your CV</h2>
            <p>Accepted: PDF, Word, Excel, PNG, JPG.</p>
          </div>
          <div class="upload-actions">
            <input
              id="cvInput"
              name="cv"
              type="file"
              accept=".pdf,.doc,.docx,.xls,.xlsx,.csv,.png,.jpg,.jpeg,.webp"
              required
            />
            <button type="button" id="cvButton" class="btn-secondary">Select file</button>
            <span id="cvFilename" class="file-name">No file selected</span>
          </div>
        </section>

        <div class="form-actions">
          <button id="submitBtn" class="btn-primary" type="submit">Apply now</button>
          <span id="formStatus" class="form-status" role="status" aria-live="polite"></span>
        </div>
      </form>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script defer src="./assets/js/applicant-form.js"></script>
</body>
</html>

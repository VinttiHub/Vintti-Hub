<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Searcher</title>
  <script src="./assets/js/auth-guard.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./assets/css/talentum.css" />
  <link rel="stylesheet" href="./assets/css/mobile.css?v=4">
  <link rel="stylesheet" href="./assets/css/details-mobile.css?v=6">
</head>
<body class="talentum">
  <div class="talentum-shell">
    <header class="talentum-header">
      <div class="title-wrap">
        <p class="eyebrow">AI Searcher</p>
        <h1>Inteligencia de oportunidades, a tu manera.</h1>
      </div>
      <div class="user-pill" id="userPill">Loading user…</div>
    </header>

    <section class="talentum-main">
      <section class="chat-panel">
        <div class="panel-head">
          <div>
            <h3>AI Searcher Chat</h3>
            <p id="chatSubtitle">Loading opportunity…</p>
          </div>
          <div class="chat-status" id="chatStatus">Idle</div>
        </div>
        <div class="chat-window" id="chatMessages" aria-live="polite"></div>
        <form class="chat-input" id="chatForm">
          <input id="chatInput" type="text" placeholder="Ask for a different focus…" autocomplete="off" />
          <button type="submit">Send</button>
        </form>
      </section>

      <section class="candidates-panel">
        <div class="panel-head">
          <div>
            <h3>Candidates</h3>
            <p id="candidateSubtitle">Loading applicants…</p>
          </div>
          <div class="panel-actions">
            <button class="panel-action-btn" id="refreshApplicantsBtn" type="button">Refresh CVs</button>
            <span class="panel-action-status" id="refreshApplicantsStatus"></span>
            <div class="candidate-count" id="candidateCount">0 matches</div>
          </div>
        </div>

        <div class="filters-card">
          <div class="filters-title">
            <span>Active filters</span>
            <span class="filters-status" id="filtersStatus">Idle</span>
          </div>
          <div class="filters-grid" id="filtersGrid"></div>
        </div>

        <div class="candidates-grid" id="candidatesGrid"></div>
        <div class="empty-state" id="candidatesEmpty">Loading applicants…</div>
      </section>
    </section>
  </div>

  <aside class="applicant-drawer" id="applicantDrawer" aria-hidden="true">
    <div class="drawer-header">
      <div>
        <p class="drawer-eyebrow">Applicant</p>
        <h3 id="drawerTitle">Applicant details</h3>
      </div>
      <div class="drawer-header-actions">
        <button class="drawer-action-btn" id="matchDrawerBtn" type="button">Match score</button>
        <button class="drawer-close" id="drawerClose" type="button" aria-label="Close applicant details">✕</button>
      </div>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
    <aside class="match-drawer" id="matchDrawer" aria-hidden="true">
      <div class="match-drawer-header">
        <div>
          <p class="drawer-eyebrow">Match score</p>
          <h3>Reasons</h3>
        </div>
        <button class="drawer-close" id="matchDrawerClose" type="button" aria-label="Close match score">✕</button>
      </div>
      <div class="match-drawer-body" id="matchDrawerBody"></div>
    </aside>
  </aside>

  <script src="./assets/js/talentum-detail.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Readonly</title>
  <link rel="stylesheet" href="./assets/css/resume-readonly.css" />
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600&display=swap" rel="stylesheet">

</head>
<body>
  <div id="resume-readonly-page" class="resume-page-root">
    <header class="cv-header">
      <div class="header-left">
        <img src="./assets/img/vintti_logo.png" alt="Vintti Logo" class="vintti-logo" />
        <div class="cv-subtitle">Top Candidate Profile</div>
      </div>
    </header>

    <div id="resume-rating" class="resume-rating" aria-label="Rate this candidate">
      <button type="button" id="resume-rating-toggle" class="resume-rating-toggle" aria-expanded="false">
        <span>Rate this candidate</span>
        <span class="resume-rating-toggle-icon" aria-hidden="true">✦</span>
      </button>
      <div id="resume-rating-bubble" class="resume-rating-bubble" role="status">
        Please rate this candidate — your comments help us improve.
      </div>
      <div class="resume-rating-panel" role="dialog" aria-label="Rate this candidate">
        <div class="resume-rating-panel-head">
          <div class="resume-rating-header">Rate this candidate</div>
          <button type="button" id="resume-rating-close" class="resume-rating-close" aria-label="Close rating panel">✕</button>
        </div>
        <div class="resume-rating-choices" role="radiogroup" aria-label="Rate this candidate">
          <button
            type="button"
            class="rating-choice rating-choice--good"
            data-value="great"
            data-stars="5"
            aria-label="Great"
            aria-pressed="false"
          >
            <span class="rating-choice-icon" aria-hidden="true">✓</span>
            <span class="rating-choice-label">Great</span>
          </button>
          <button
            type="button"
            class="rating-choice rating-choice--bad"
            data-value="bad"
            data-stars="1"
            aria-label="Bad"
            aria-pressed="false"
          >
            <span class="rating-choice-icon" aria-hidden="true">✕</span>
            <span class="rating-choice-label">Bad</span>
          </button>
        </div>
        <div class="resume-rating-comment">
          <label for="resume-rating-comment">Comments</label>
          <textarea id="resume-rating-comment" placeholder="Add a quick note" rows="3"></textarea>
        </div>
        <div class="resume-rating-actions">
          <span id="resume-rating-status" class="resume-rating-status" aria-live="polite"></span>
        </div>
      </div>
    </div>

    <div class="cv-container">
    <h1 id="candidateNameTitle" class="cv-title">Candidate Name</h1>
    <p id="candidateCountry" class="cv-country">—</p>
    <!-- About -->
    <section class="cv-section">
      <h2 class="cv-heading" data-icon="🧠">About</h2>
      <div class="cv-card">
        <p id="aboutField">Click here to edit your About section.</p>
      </div>
    </section>

    <!-- Work Experience -->
    <section class="cv-section" id="workExperienceSection">
      <h2 class="cv-heading" data-icon="💼">Work Experience</h2>
      <div class="cv-card timeline" id="workExperienceList">
        <div class="cv-entry-left">
            <span class="cv-entry-date"></span>
            <span class="cv-entry-location"></span>
          </div>
          <div class="cv-entry-right">
            <span class="cv-entry-role"></span>
            <span class="cv-entry-company"></span>
            <p class="cv-entry-summary"></p>
            <ul class="cv-entry-bullets"></ul>
          </div>
      </div>
    </section>

    <!-- Education -->
    <section class="cv-section" id="educationSection">
      <h2 class="cv-heading" data-icon="🎓">Education</h2>
      <div class="cv-card timeline" id="educationList">
        <div class="cv-entry-left">
            <span class="cv-entry-date"></span>
            <span class="cv-entry-location"></span>
          </div>
          <div class="cv-entry-right">
            <span class="cv-entry-role"></span>
            <span class="cv-entry-company"></span>
            <ul class="cv-entry-bullets"></ul>
          </div>
      </div>
    </section>

    <!-- Tools -->
    <section class="cv-section" id="toolsSection">
      <h2 class="cv-heading" data-icon="🛠️">Tools</h2>
      <div class="cv-card" id="toolsList"></div>
    </section>

    <!-- Languages -->
    <section class="cv-section" id="languagesSection">
      <h2 class="cv-heading" data-icon="🌐">Languages</h2>
      <div class="cv-card" id="languagesList"></div>
    </section>

    <!-- Video Link -->
    <section class="cv-section" id="videoLinkSection">
      <h2 class="cv-heading" data-icon="📹">Video Link</h2>
      <div class="cv-card">
        <div id="readonly-video-link" class="video-link-container">—</div>
      </div>
    </section>

  </div>

    <footer class="cv-footer">
      Powered by <strong>Vintti</strong> · <a href="https://www.vintti.com" target="_blank">vintti.com</a>
    </footer>
  </div>

  <button id="readonly-download-btn" class="resume-download-button" type="button">
    <span aria-hidden="true">⬇️</span>
    <span class="label">Download PDF</span>
  </button>

  <script defer src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script defer src="./assets/js/resume-readonly.js"></script>
</body>
</html>
